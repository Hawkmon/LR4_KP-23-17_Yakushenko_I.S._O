<!DOCTYPE html>
<html>
  <head>
    <!-- 1. Определение кодировки -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Task Tracker</title>

    <!-- 2. Подключение Bootstrap CSS из CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

  </head>
  <body>
    <!-- 3. csrf_token: защита от CSRF-атак -->
    {% csrf_token %}
    <div class="container">
      <br>

      <h2><strong>Task Tracker Якушенко И.С. 📝</strong></h2>

      <br>

      <!-- 4. Неупорядоченный список -->
      <ul class="list-group">

        <!-- 5. Элементы списка -->
        <li class="list-group-item mb-2">
          1. Посетить первую пару.
        </li> 
        <li class="list-group-item mb-2">
          2. Посетить вторую пару.
        </li> 
        <li class="list-group-item mb-2">
          3. Посетить третью пару.
        </li>
        <li class="list-group-item mb-2">
          4. Посетить четвертую пару.
        </li> 
        <li class="list-group-item mb-2">
          5. Вернуться домой.
        </li> 
        <li class="list-group-item mb-2">
          6. Вкусно покушать.
        </li>
        <li class="list-group-item mb-2">
          7. Уснуть.
        </li> 

      </ul>

    </div>

    <!-- 6. Подключение Bootstrap JS из CDN: необходим для работы интерактивных компонентов Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

  </body>
</html>
